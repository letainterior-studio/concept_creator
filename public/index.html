<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leta Concept Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #3a3a3a; --card: #2e2e2e; --card2: #272727;
  --white: #fff; --muted: rgba(255,255,255,0.55); --dim: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.12); --accent: rgba(255,255,255,0.07); --gold: #c9a96e;
}
body { background:var(--bg); color:var(--white); font-family:'Jost',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }

header { display:flex; align-items:center; justify-content:space-between; padding:18px 36px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:100; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-l { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:300; border-left:2px solid #fff; padding-left:7px; line-height:1; }
.logo-text { font-size:8px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; line-height:1.6; }
.app-name { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--dim); }

.api-bar { background:var(--card2); border-bottom:1px solid var(--border); padding:9px 36px; display:flex; align-items:center; gap:16px; }
.api-bar label { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); white-space:nowrap; }
.api-bar input { flex:1; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--muted); font-family:monospace; font-size:11px; padding:3px 0; outline:none; }
.api-bar input:focus { border-color:var(--dim); color:#fff; }
.api-dot { width:6px; height:6px; border-radius:50%; background:#555; flex-shrink:0; transition:background 0.3s; }
.api-dot.ok { background:#6dbf7e; }

main { flex:1; display:grid; grid-template-columns:320px 1fr; min-height:0; }
.panel-left { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
.section { padding:20px 24px; border-bottom:1px solid var(--border); }
.section-label { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-bottom:12px; }

.upload-zone { border:1px dashed var(--border); padding:16px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
.upload-zone:hover,.upload-zone.drag { border-color:var(--dim); background:var(--accent); }
.upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:18px; opacity:0.35; margin-bottom:5px; }
.upload-label { font-size:9px; color:var(--muted); letter-spacing:1px; }

.thumbs { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:10px; }
.thumb { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; opacity:0.8; }

.concept-preview { margin-top:10px; display:flex; align-items:center; gap:10px; background:var(--card2); padding:10px; border:1px solid var(--border); }
.concept-thumb { width:52px; height:52px; object-fit:cover; flex-shrink:0; display:block; }
.concept-pdf-icon { width:52px; height:52px; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; color:var(--gold); letter-spacing:1px; }
.concept-info .cname { font-size:10px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
.concept-info .ctype { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); margin-top:3px; }

.field { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.field label { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); }
.field input,.field textarea { background:transparent; border:none; border-bottom:1px solid var(--border); color:#fff; font-family:'Jost',sans-serif; font-size:12px; font-weight:300; padding:5px 0; outline:none; resize:none; width:100%; }
.field input::placeholder,.field textarea::placeholder { color:var(--dim); }

.btn-gen { margin:20px 24px; background:transparent; border:1px solid var(--dim); color:#fff; font-family:'Jost',sans-serif; font-weight:300; font-size:9px; letter-spacing:4px; text-transform:uppercase; padding:13px; width:calc(100% - 48px); cursor:pointer; transition:all 0.25s; }
.btn-gen:hover:not(:disabled) { background:var(--accent); border-color:rgba(255,255,255,0.4); }
.btn-gen:disabled { opacity:0.3; cursor:not-allowed; }
.btn-gen.loading { border-color:var(--gold); color:var(--gold); }

.panel-right { display:flex; flex-direction:column; overflow-y:auto; }
.out-header { padding:18px 32px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.out-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:300; color:var(--muted); }
.out-title.active { color:#fff; }
.btn-copy-all { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); background:transparent; border:1px solid var(--border); padding:6px 12px; cursor:pointer; font-family:'Jost',sans-serif; transition:all 0.2s; }
.btn-copy-all:hover { color:#fff; border-color:var(--dim); }

.out-body { flex:1; padding:28px 32px; display:flex; flex-direction:column; gap:32px; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; opacity:0.2; gap:10px; }
.empty-g { font-family:'Cormorant Garamond',serif; font-size:72px; font-weight:300; font-style:italic; }
.empty-t { font-size:8px; letter-spacing:4px; text-transform:uppercase; }

.out-block { opacity:0; transform:translateY(10px); animation:fadeUp 0.45s ease forwards; }
@keyframes fadeUp { to { opacity:1; transform:none; } }
.blk-label { font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.blk-content { font-size:13px; line-height:1.9; color:var(--muted); white-space:pre-wrap; }

/* МАТЕРИАЛЫ */
.materials-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
.mat-card { background:var(--card2); overflow:hidden; border:1px solid var(--border); transition: border-color 0.3s, transform 0.3s; }
.mat-card:hover { border-color: var(--dim); transform: translateY(-2px); }
.mat-img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; filter:brightness(0.9); transition: filter 0.3s; }
.mat-card:hover .mat-img { filter:brightness(1); }
.mat-skeleton { width:100%; aspect-ratio:4/3; background: linear-gradient(90deg, var(--card2) 25%, var(--card) 50%, var(--card2) 75%); background-size:200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.mat-body { padding:14px 16px 16px; }
.mat-name { font-size:13px; color:var(--white); line-height:1.3; margin-bottom:5px; font-family:'Cormorant Garamond',serif; font-size:16px; }
.mat-desc { font-size:10px; color:var(--muted); line-height:1.6; letter-spacing:0.3px; }

.prompt-box { background:var(--card2); border:1px solid var(--border); padding:18px 110px 18px 20px; font-size:11.5px; line-height:1.8; color:rgba(255,255,255,0.78); white-space:pre-wrap; position:relative; }
.btn-cp { position:absolute; top:12px; right:12px; font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); background:transparent; border:1px solid var(--border); padding:4px 10px; cursor:pointer; font-family:'Jost',sans-serif; transition:all 0.2s; }
.btn-cp:hover { color:#fff; border-color:var(--dim); }

.thinking { display:flex; align-items:center; gap:10px; color:var(--dim); font-size:9px; letter-spacing:3px; text-transform:uppercase; padding:36px 0; }
.dots span { display:inline-block; width:4px; height:4px; background:var(--dim); border-radius:50%; animation:pulse 1.2s infinite; margin:0 2px; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-l">L</div>
    <div class="logo-text">Leta architecture<br>and interior</div>
  </div>
  <div class="app-name">Concept Creator</div>
</header>

<div class="api-bar">
  <label>Claude API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="checkKey()">
  <div class="api-dot" id="apiDot"></div>
</div>

<main>
  <div class="panel-left">
    <div class="section">
      <div class="section-label">Проект</div>
      <div class="field"><label>Название</label><input id="pName" placeholder="Irina & Vlad · Caesarea · Israel"></div>
      <div class="field"><label>Помещение</label><input id="pRoom" placeholder="Ванная, 8 м²"></div>
      <div class="field"><label>Пожелания клиента</label><textarea id="pWish" rows="3" placeholder="Тёплая атмосфера, природные материалы..."></textarea></div>
    </div>
    <div class="section">
      <div class="section-label">Референсы клиента</div>
      <div class="upload-zone" id="refZone">
        <input type="file" id="refInput" multiple accept="image/*" onchange="handleRefs(event)">
        <div class="upload-icon">◻</div>
        <div class="upload-label">Фото · несколько файлов</div>
      </div>
      <div class="thumbs" id="refThumbs"></div>
    </div>
    <div class="section">
      <div class="section-label">Концепт дизайнера</div>
      <div class="upload-zone" id="conZone">
        <input type="file" id="conInput" accept="image/*,application/pdf" onchange="handleConcept(event)">
        <div class="upload-icon">◻</div>
        <div class="upload-label">Фото или PDF</div>
      </div>
      <div id="conPreview"></div>
    </div>
    <button class="btn-gen" id="genBtn" onclick="generate()" disabled>Создать концепт</button>
  </div>

  <div class="panel-right">
    <div class="out-header">
      <div class="out-title" id="outTitle">Результат</div>
      <button class="btn-copy-all" id="copyAllBtn" onclick="copyAll()" style="display:none">Скопировать всё</button>
    </div>
    <div class="out-body" id="outBody">
      <div class="empty">
        <div class="empty-g">L</div>
        <div class="empty-t">Заполни форму и нажми создать</div>
      </div>
    </div>
  </div>
</main>

<script>
let refImages = [];
let conceptData = null;
let lastText = '';
let apiKey = '';

function checkKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  document.getElementById('apiDot').className = 'api-dot' + (apiKey.startsWith('sk-ant-') ? ' ok' : '');
  document.getElementById('genBtn').disabled = !apiKey.startsWith('sk-ant-');
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function getMime(file) { return file.type || (file.name.endsWith('.pdf') ? 'application/pdf' : 'image/jpeg'); }

async function handleRefs(e) {
  const files = Array.from(e.target.files);
  refImages = [];
  const container = document.getElementById('refThumbs');
  container.innerHTML = '';
  for (const f of files) {
    const b64 = await toBase64(f);
    const mime = getMime(f);
    refImages.push({ base64: b64, mediaType: mime });
    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = 'data:' + mime + ';base64,' + b64;
    container.appendChild(img);
  }
}

async function handleConcept(e) {
  const f = e.target.files[0];
  if (!f) return;
  const b64 = await toBase64(f);
  const mime = getMime(f);
  conceptData = { base64: b64, mediaType: mime, name: f.name };
  const isPDF = mime === 'application/pdf';
  document.getElementById('conPreview').innerHTML = `
    <div class="concept-preview">
      ${isPDF ? '<div class="concept-pdf-icon">PDF</div>' : '<img class="concept-thumb" src="data:' + mime + ';base64,' + b64 + '">'}
      <div class="concept-info">
        <div class="cname">${f.name}</div>
        <div class="ctype">${isPDF ? 'PDF документ' : 'Изображение'}</div>
      </div>
    </div>`;
}

async function claudeCall(messages, system, maxTokens) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: maxTokens, system, messages })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.text || '').join('');
}

async function generate() {
  apiKey = document.getElementById('apiKey').value.trim();
  const name = document.getElementById('pName').value || 'Проект';
  const room = document.getElementById('pRoom').value || '';
  const wish = document.getElementById('pWish').value || '';

  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.classList.add('loading'); btn.textContent = 'Анализирую...';
  document.getElementById('outTitle').textContent = name;
  document.getElementById('outTitle').classList.add('active');
  document.getElementById('copyAllBtn').style.display = 'none';
  document.getElementById('outBody').innerHTML = '<div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span>Анализирую референсы</span></div>';

  try {
    // --- ЗАПРОС 1: основной анализ ---
    const content = [];
    if (refImages.length > 0) {
      content.push({ type: 'text', text: 'Референсы клиента:' });
      for (const img of refImages)
        content.push({ type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.base64 } });
    }
    if (conceptData) {
      content.push({ type: 'text', text: 'Концепт дизайнера:' });
      if (conceptData.mediaType === 'application/pdf')
        content.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: conceptData.base64 } });
      else
        content.push({ type: 'image', source: { type: 'base64', media_type: conceptData.mediaType, data: conceptData.base64 } });
    }
    content.push({ type: 'text', text: `Проект: ${name}\nПомещение: ${room}\nПожелания: ${wish}

Создай документ строго по формату:

1. КОНЦЕПЦИЯ
[3-4 предложения — суть стиля, атмосфера, характер пространства]

2. МАТЕРИАЛЫ
СТРОГО 3 материала — только самые главные которые создают образ интерьера. Не больше 3. Формат: - Название | применение
Пример:
- Мрамор Calacatta | стены и пол
- Шпон ореха | фасады тумбы
- Латунь матовая | смесители и фурнитура

3. ЦВЕТОВАЯ ПАЛИТРА
[3 основных тона]

4. ОСВЕЩЕНИЕ
[2-3 предложения]

5. ЗАМЕТКИ ДЛЯ ВИЗУАЛИЗАТОРА
[детали]

6. ПРОМПТ ДЛЯ AI-ВИЗУАЛИЗАЦИИ
[одна строка на английском, Midjourney-стиль]` });

    const mainText = await claudeCall(
      [{ role: 'user', content }],
      'Ты — старший дизайнер интерьеров Leta Architecture and Interior. Пишешь по-русски, профессионально и лаконично.',
      2000
    );
    lastText = mainText;

    // Парсим материалы из ответа
    const matSection = mainText.match(/2\.\s*МАТЕРИАЛЫ([\s\S]*?)(?=\n\d+\.|$)/i);
    const matLines = matSection
      ? matSection[1].split('\n').filter(l => l.trim().startsWith('-'))
      : [];
    const materials = matLines.slice(0, 3).map(l => {
      const parts = l.replace(/^-\s*/, '').split('|');
      return { name: parts[0].trim(), desc: parts[1] ? parts[1].trim() : '' };
    });

    // Рендерим основной текст
    await renderOutput(mainText, materials);
    document.getElementById('copyAllBtn').style.display = '';

    // --- ЗАПРОС 2: фото текстур через Claude ---
    if (materials.length > 0) {
      btn.textContent = 'Генерирую текстуры...';
      await loadTextureImages(materials);
    }

  } catch(err) {
    document.getElementById('outBody').innerHTML = `<div style="color:#e07070;font-size:12px;padding:20px">Ошибка: ${err.message}</div>`;
  }

  btn.disabled = false; btn.classList.remove('loading'); btn.textContent = 'Создать концепт';
}

  function pick(n) {

async function renderOutput(text, materials) {
  const body = document.getElementById('outBody');
  body.innerHTML = '';

  const sections = text.split(/\n(?=#{0,3}\s*\d+[\.\)]\s)/);

  for (let i = 0; i < sections.length; i++) {
    const sec = sections[i].trim();
    if (!sec) continue;

    const lines = sec.split('\n');
    const heading = lines[0].replace(/^#+\s*/, '').replace(/^\d+[\.\)]\s*/, '').trim();
    const content = lines.slice(1).join('\n').replace(/\*\*/g, '').trim();
    const isMaterials = /материал/i.test(heading);
    const isPrompt = /промпт/i.test(heading);

    const block = document.createElement('div');
    block.className = 'out-block';
    block.style.animationDelay = (i * 0.08) + 's';

    if (isMaterials && materials.length > 0) {
      block.innerHTML = `<div class="blk-label">${heading}</div><div class="materials-grid" id="matGrid"></div>`;
      body.appendChild(block);
      const grid = document.getElementById('matGrid');
      materials.forEach(m => {
        const card = document.createElement('div');
        card.className = 'mat-card';
        card.innerHTML = `
          <div class="mat-skeleton"></div>
          <div class="mat-body">
            <div class="mat-name">${m.name}</div>
            ${m.desc ? '<div class="mat-desc">' + m.desc + '</div>' : ''}
          </div>`;
        grid.appendChild(card);
      });
    } else if (isPrompt) {
      block.innerHTML = `<div class="blk-label">${heading}</div><div class="prompt-box"><button class="btn-cp" onclick="cpPrompt(this)">Копировать</button>${content}</div>`;
      body.appendChild(block);
    } else {
      block.innerHTML = `<div class="blk-label">${heading}</div><div class="blk-content">${content}</div>`;
      body.appendChild(block);
    }
  }
}

function cpPrompt(btn) {
  const text = btn.parentElement.innerText.replace('Копировать','').trim();
  navigator.clipboard.writeText(text);
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = 'Копировать', 2000);
}
function copyAll() {
  navigator.clipboard.writeText(lastText);
  const btn = document.getElementById('copyAllBtn');
  btn.textContent = '✓ Скопировано';
  setTimeout(() => btn.textContent = 'Скопировать всё', 2000);
}

['refZone','conZone'].forEach(id => {
  const z = document.getElementById(id);
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag'); });
  z.addEventListener('dragleave', () => z.classList.remove('drag'));
  z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('drag'); });
});
</script>
</body>
</html>
